<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<div class="form-box">

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="class" placeholder="Class">

<select id="section">
<option value="">Select Section</option>
<option value="A">Section A</option>
<option value="B">Section B</option>
<option value="C">Section C</option>
</select>

<input type="number" id="roll" placeholder="Roll Number">

<input type="number" id="mobile" placeholder="Mobile Number">

<button onclick="addStudent()">Add Student</button>

</div>

<div class="buttons">

<button onclick="showSection('A')">Section A</button>

<button onclick="showSection('B')">Section B</button>

<button onclick="showSection('C')">Section C</button>

</div>

<h2 id="title">Students List</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Section</th>
<th>Roll No</th>
<th>Mobile</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
